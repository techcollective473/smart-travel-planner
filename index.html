<!DOCTYPE html>
<html>
<head>
  <title>Smart Travel Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">

  <!-- WHEELS -->
  <div class="wheel top-left"></div>
  <div class="wheel top-right"></div>
  <div class="wheel bottom-left"></div>
  <div class="wheel bottom-right"></div>

  <!-- TEXT -->
  <div id="text">नमस्ते</div>

</div>

<!-- MAIN -->
<div id="main">

  <!-- ATTRACTIONS -->
  <section class="section">
    <h1>Attractions</h1>
    <div class="scroll" id="attractions"></div>
  </section>

  <!-- DESTINATIONS -->
  <section class="section">
    <h1>Destinations</h1>

    <select id="interest">
      <option>Beaches</option>
      <option>Mountains</option>
      <option>Spiritual</option>
    </select>

    <select id="region">
      <option>North</option>
      <option>South</option>
    </select>

    <button onclick="filterPlaces()">Search</button>

    <div id="results"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
